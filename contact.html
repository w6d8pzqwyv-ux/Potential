<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | すぽーつくらぶ　ぽてんしゃる</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                🤸 すぽーつくらぶ　ぽてんしゃる
                <span class="logo-sub">出張体育指導サービス</span>
            </div>
            <button class="nav-toggle" aria-label="メニュー">☰</button>
            <ul class="nav-links">
                <li><a href="index.html">ホーム</a></li>
                <li><a href="about.html">私たちについて</a></li>
                <li><a href="services.html">サービス内容</a></li>
                <li><a href="contact.html" class="active">お問い合わせ</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="page-header">
            <h1>お問い合わせ</h1>
            <p>ご質問・ご相談・無料サンプル授業のご依頼など、なんでもお気軽にどうぞ😊</p>
        </section>

        <section class="section">
            <form class="contact-form">
                <div class="form-group">
                    <label for="facility-name">施設名 <span class="required">※必須</span></label>
                    <input type="text" id="facility-name" name="facility-name" placeholder="例：○○保育園" required>
                </div>
                <div class="form-group">
                    <label for="facility-type">施設の種別 <span class="required">※必須</span></label>
                    <select id="facility-type" name="facility-type" required>
                        <option value="">選択してください</option>
                        <option value="nursery">保育園・こども園</option>
                        <option value="dayservice">児童デイサービス（放課後等デイサービス）</option>
                        <option value="afterschool">学童保育</option>
                        <option value="other">その他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="contact-name">ご担当者名 <span class="required">※必須</span></label>
                    <input type="text" id="contact-name" name="contact-name" placeholder="例：田中 太郎" required>
                </div>
                <div class="form-group">
                    <label for="role">役職</label>
                    <input type="text" id="role" name="role" placeholder="例：園長、施設長、主任など">
                </div>
                <div class="form-group">
                    <label for="phone">電話番号 <span class="required">※必須</span></label>
                    <input type="tel" id="phone" name="phone" placeholder="例：000-0000-0000" required>
                </div>
                <div class="form-group">
                    <label for="email">メールアドレス <span class="required">※必須</span></label>
                    <input type="email" id="email" name="email" placeholder="例：example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="children-count">子どもたちの人数（だいたいで大丈夫です）</label>
                    <input type="text" id="children-count" name="children-count" placeholder="例：30名ほど">
                </div>
                <div class="form-group">
                    <label for="message">ご相談内容・ご質問など</label>
                    <textarea id="message" name="message" rows="5" placeholder="どんな小さなことでもお気軽にどうぞ！&#10;（無料サンプル授業のご希望もこちらから）"></textarea>
                </div>
                <button type="submit" class="btn btn-orange" style="width:100%;font-size:1.1rem;padding:1rem;">
                    📩 送信する
                </button>
            </form>
        </section>
    </main>

    <script src="js/main.js"></script>
    <footer>
        <div class="footer-logo">🤸 すぽーつくらぶ　ぽてんしゃる</div>
        <p>出張体育指導サービス</p>
        <p style="margin-top:1rem;">&copy; 2026 すぽーつくらぶ　ぽてんしゃる. All rights reserved.</p>
    </footer>
</body>
</html>
