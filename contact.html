<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体験申込 | すぽーつくらぶ　ぽてんしゃる</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                🤸 すぽーつくらぶ　ぽてんしゃる
                <span class="logo-sub">子どもの「できた！」を育てる</span>
            </div>
            <button class="nav-toggle" aria-label="メニュー">☰</button>
            <ul class="nav-links">
                <li><a href="index.html">ホーム</a></li>
                <li><a href="about.html">教室について</a></li>
                <li><a href="services.html">クラス案内</a></li>
                <li><a href="contact.html" class="active">体験申込</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="page-header">
            <h1>体験申込・お問い合わせ</h1>
            <p>お気軽にご連絡ください。2営業日以内にご返信します</p>
        </section>

        <section class="section">
            <form class="contact-form">
                <div class="form-group">
                    <label for="parent-name">保護者のお名前 <span class="required">※必須</span></label>
                    <input type="text" id="parent-name" name="parent-name" placeholder="例：山田 花子" required>
                </div>
                <div class="form-group">
                    <label for="child-name">お子さまのお名前 <span class="required">※必須</span></label>
                    <input type="text" id="child-name" name="child-name" placeholder="例：山田 太郎" required>
                </div>
                <div class="form-group">
                    <label for="child-age">お子さまの年齢 <span class="required">※必須</span></label>
                    <select id="child-age" name="child-age" required>
                        <option value="">選択してください</option>
                        <option value="3">3歳</option>
                        <option value="4">4歳</option>
                        <option value="5">5歳</option>
                        <option value="6">6歳</option>
                        <option value="7">7歳</option>
                        <option value="8">8歳</option>
                        <option value="9">9歳</option>
                        <option value="10">10歳</option>
                        <option value="11">11歳</option>
                        <option value="12">12歳</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="email">メールアドレス <span class="required">※必須</span></label>
                    <input type="email" id="email" name="email" placeholder="例：example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="class-type">希望クラス</label>
                    <select id="class-type" name="class-type">
                        <option value="">未定（ご提案を希望）</option>
                        <option value="infant">幼児体操クラス（3〜5歳）</option>
                        <option value="elementary">小学生体操クラス（6〜12歳）</option>
                        <option value="individual">個別指導</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">ご質問・ご要望</label>
                    <textarea id="message" name="message" rows="5" placeholder="体験を希望する日時や、ご不明な点があればお気軽にどうぞ"></textarea>
                </div>
                <button type="submit" class="btn btn-orange" style="width:100%;font-size:1.1rem;padding:1rem;">
                    🎉 申し込む
                </button>
            </form>
        </section>
    </main>

    <script src="js/main.js"></script>
    <footer>
        <div class="footer-logo">🤸 すぽーつくらぶ　ぽてんしゃる</div>
        <p>子どもたちの「できた！」を一緒に育てます</p>
        <p style="margin-top:1rem;">&copy; 2026 すぽーつくらぶ　ぽてんしゃる. All rights reserved.</p>
    </footer>
</body>
</html>
